<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navalha | Cliente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/barbearia/styles.css" />
  <style>
    .client-wrap { max-width: 680px; margin: 0 auto; }
    .client-hero { padding: 20px 0 10px; }
    .client-hero h1 { font-family:'Bebas Neue',sans-serif; font-size: clamp(2.4rem, 8vw, 4rem); margin:0; }
    .client-hero p { color: var(--muted); margin: 6px 0 0; }
    .client-grid { display:grid; gap:10px; }
    .client-grid label { display:grid; gap:6px; font-weight:700; }
    .client-grid input,.client-grid select,.client-grid button{ width:100%; border-radius:10px; padding:11px; }
    .client-grid button{ border:0; font-weight:800; }
    .subtle { color: var(--muted); font-size:.9rem; }
    .quick-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    @media (max-width:760px){ .quick-row{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  <main class="container client-wrap">
    <section class="client-hero">
      <p class="eyebrow">Navalha Cliente</p>
      <h1>Agende em menos de 1 minuto.</h1>
      <p>Login rapido com telefone e senha.</p>
    </section>

    <section class="panel" id="authCard">
      <h2>Acesso</h2>
      <form id="clientLoginForm" class="client-grid">
        <label>Telefone
          <input id="phone" type="tel" placeholder="Ex: 11988887777" required />
        </label>
        <label>Senha
          <input id="password" type="password" placeholder="Sua senha" required />
        </label>
        <button class="cta" type="submit">Entrar e Agendar</button>
      </form>
      <p class="subtle">Demo cliente: 11988887777 / cliente123</p>
      <p id="authMsg" class="feedback"></p>
    </section>

    <section class="panel" id="bookingCard" style="display:none;">
      <div class="quick-row">
        <h2>Seu Agendamento</h2>
        <button id="logoutBtn" class="ghost" type="button">Sair</button>
      </div>

      <form class="client-grid" onsubmit="return false;">
        <label>Barbeiro
          <select id="barberId"></select>
        </label>
        <label>Data
          <input id="date" type="date" />
        </label>
        <label>Horario
          <select id="slot"></select>
        </label>
        <label>Servicos
          <select id="services" multiple></select>
        </label>
        <button id="confirmBtn" class="cta" type="button">Confirmar Agendamento</button>
      </form>
      <p id="bookingMsg" class="feedback"></p>
    </section>
  </main>
  <script src="/cliente/app.js"></script>
</body>
</html>
