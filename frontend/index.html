<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navalha | Portal</title>
  <meta name="theme-color" content="#0b0b0d" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      margin:0;
      font-family:Barlow,sans-serif;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        linear-gradient(135deg, rgba(6, 11, 17, .82), rgba(10, 16, 24, .82)),
        url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed,
        #0a0f16;
      color:#f3f4f6;
    }
    .wrap { width:min(920px,92vw); display:grid; gap:14px; }
    .card {
      border:1px solid rgba(255,255,255,.16);
      border-radius:18px;
      padding:24px;
      background:linear-gradient(140deg,rgba(12, 20, 31, .86),rgba(11, 18, 32, .9));
      backdrop-filter: blur(6px);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }
    h1 { font-family:'Bebas Neue',sans-serif; letter-spacing:1px; margin:0 0 6px; font-size:3rem; }
    p { color:#9aa8bb; margin:0 0 20px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    a { text-decoration:none; color:#fff; font-weight:800; border-radius:14px; padding:16px; display:block; text-align:center; }
    .cliente { background:#ffffff; color:#0b1220; }
    .barbearia { background:linear-gradient(90deg,#ff7a00,#ff9f3f); }
    @media (max-width:760px){
      body { background-attachment: scroll; }
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>NAVALHA</h1>
      <p>Plataforma de assinatura para barbearias. Escolha seu acesso.</p>
      <div class="grid">
        <a class="cliente" href="/cliente">Entrar como Cliente</a>
        <a class="barbearia" href="/barbearia">Entrar como Barbearia</a>
      </div>
    </section>
  </main>
  <script src="/pwa-register.js"></script>
</body>
</html>
