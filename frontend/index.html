<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navalha | Portal</title>
  <meta name="theme-color" content="#0b0b0d" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #070b12;
      --ink: #f5f7fb;
      --ink-muted: #a6b3c7;
      --line: rgba(255, 255, 255, 0.18);
      --panel-a: rgba(8, 18, 33, 0.82);
      --panel-b: rgba(9, 19, 39, 0.88);
      --accent: #7b5cff;
      --accent-soft: #22d3ee;
      --client: #ecefff;
      --client-ink: #131a36;
      --shadow: 0 28px 60px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Barlow, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 16%, rgba(123, 92, 255, 0.28), transparent 36%),
        radial-gradient(circle at 88% 78%, rgba(34, 211, 238, 0.18), transparent 42%),
        linear-gradient(135deg, rgba(6, 11, 17, .86), rgba(7, 12, 20, .86)),
        url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed,
        var(--bg-deep);
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        115deg,
        rgba(255, 255, 255, 0.02) 0 2px,
        transparent 2px 8px
      );
      mix-blend-mode: soft-light;
      opacity: 0.35;
    }

    .wrap {
      width: min(980px, 92vw);
      display: grid;
      gap: 14px;
      animation: rise .6s cubic-bezier(.22, .95, .32, 1) both;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 28px 30px 30px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 38%),
        linear-gradient(140deg, var(--panel-a), var(--panel-b));
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -84px;
      top: -84px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(123, 92, 255, 0.28), transparent 72%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #d8e3f5;
      padding: 6px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
      margin: 0 0 8px;
      font-size: clamp(2.6rem, 5vw, 4rem);
      line-height: .9;
    }

    p {
      color: var(--ink-muted);
      margin: 0 0 24px;
      font-size: clamp(1rem, 1.3vw, 1.35rem);
      max-width: 60ch;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    a {
      text-decoration: none;
      color: #fff;
      font-weight: 800;
      border-radius: 16px;
      padding: 17px 18px;
      display: block;
      text-align: center;
      font-size: 1.12rem;
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
      position: relative;
      isolation: isolate;
    }

    a::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 15px;
      z-index: -1;
      opacity: 0;
      transition: opacity .22s ease;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.26), transparent 45%);
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.28);
      filter: brightness(1.02);
    }

    a:hover::before,
    a:focus-visible::before {
      opacity: .9;
    }

    .cliente {
      background: var(--client);
      color: var(--client-ink);
    }

    .barbearia { background: linear-gradient(95deg, var(--accent), var(--accent-soft)); }

    .cliente:focus-visible,
    .barbearia:focus-visible {
      outline: 2px solid #d2e4ff;
      outline-offset: 2px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width:760px){
      body { background-attachment: scroll; }
      .card { padding: 24px 18px 20px; border-radius: 18px; }
      .grid { grid-template-columns:1fr; gap: 10px; }
      a { padding: 15px 14px; font-size: 1.04rem; }
      p { font-size: 1rem; }
      .eyebrow { margin-bottom: 10px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <span class="eyebrow">Navalha Portal</span>
      <h1>NAVALHA</h1>
      <p>Plataforma de assinatura para barbearias. Escolha seu acesso.</p>
      <div class="grid">
        <a class="cliente" href="/cliente">Entrar como Cliente</a>
        <a class="barbearia" href="/barbearia">Entrar como Barbearia</a>
      </div>
    </section>
  </main>
  <script src="/pwa-register.js"></script>
</body>
</html>
